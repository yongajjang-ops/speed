<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="speedGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00cc6a"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="270" r="140" fill="none" stroke="url(#cyanGlow)" stroke-width="8" opacity="0.3"/>

  <!-- Speed meter arc -->
  <path d="M 140 320 A 130 130 0 0 1 372 320" fill="none" stroke="url(#speedGreen)" stroke-width="16" stroke-linecap="round"/>

  <!-- Bicycle icon -->
  <g transform="translate(256, 280)">
    <!-- Back wheel -->
    <circle cx="-70" cy="30" r="45" fill="none" stroke="#00ff88" stroke-width="8"/>
    <circle cx="-70" cy="30" r="8" fill="#00ff88"/>

    <!-- Front wheel -->
    <circle cx="70" cy="30" r="45" fill="none" stroke="#00ff88" stroke-width="8"/>
    <circle cx="70" cy="30" r="8" fill="#00ff88"/>

    <!-- Frame -->
    <path d="M -70 30 L -20 -30 L 30 -30 L 70 30 M -20 -30 L -70 30 M 30 -30 L -20 30 L -70 30"
          fill="none" stroke="#00d4ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Handlebar -->
    <path d="M 30 -30 L 40 -50 L 60 -50" fill="none" stroke="#00d4ff" stroke-width="8" stroke-linecap="round"/>

    <!-- Seat -->
    <path d="M -20 -30 L -25 -55 M -40 -55 L -10 -55" fill="none" stroke="#00d4ff" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Speed text -->
  <text x="256" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#00ff88">GPS</text>
  <text x="256" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#00d4ff">SPEED</text>
</svg>
